<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Feed — ZIZO · Abdelaziz Askar</title>
<link rel="icon" href="assets/photos/escapegoat-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<meta name="description" content="ZIZO's live creative feed — ideas, work-in-progress, client results, and video guides.">
<style>
:root{
  --bg:#09090c; --surface:#111118; --surface2:#19191f; --border:#252532;
  --accent:#f0c233; --text:#f3f0eb; --muted:#706c64; --muted2:#b5b0a6;
  --font:'Inter','Helvetica Neue',Arial,sans-serif; --r:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;padding-bottom:80px}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;border-bottom:1px solid var(--border);
  background:rgba(5,5,6,.97);backdrop-filter:blur(20px);
}
.nav-logo{font-size:14px;font-weight:700;color:var(--muted2);display:flex;align-items:center;gap:2px}
.nav-logo em{color:var(--accent);font-style:normal;font-size:19px;font-weight:900}
.nav-divider{color:var(--muted);margin:0 7px;font-weight:300}
.nav-links{display:flex;gap:26px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);transition:color .2s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-cta{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;padding:9px 20px;background:var(--accent);color:#000;border-radius:var(--r);transition:filter .2s}
.nav-cta:hover{filter:brightness(1.08)}

/* PAGE HEADER */
.page-header{
  padding:60px 48px 40px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:24px;
  background:radial-gradient(ellipse at 20% 50%,rgba(240,194,51,.05) 0%,transparent 60%);
}
.ph-left .eyebrow{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;font-weight:600}
.ph-left .eyebrow::before{content:'';display:block;width:22px;height:2px;background:var(--accent);margin-bottom:13px;border-radius:1px}
.ph-left h1{font-size:clamp(34px,4vw,56px);font-weight:900;letter-spacing:-2px;line-height:.9}
.ph-left h1 em{color:var(--accent);font-style:normal}
.ph-left p{font-size:14px;color:var(--muted2);margin-top:16px;max-width:520px;line-height:1.7}
.ph-right .post-count{font-size:52px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-2px;text-align:right}
.ph-right .pc-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:4px;text-align:right}

/* FEED LAYOUT */
.feed-wrap{max-width:840px;margin:0 auto;padding:48px 48px 0}

/* POST CARD */
.post-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;margin-bottom:28px;
  transition:border-color .2s;
}
.post-card:hover{border-color:rgba(240,194,51,.25)}
.post-card.pinned{border-color:rgba(240,194,51,.4);box-shadow:0 0 0 1px rgba(240,194,51,.1)}

/* POST META */
.post-meta{
  display:flex;align-items:center;gap:12px;
  padding:18px 24px 0;
}
.post-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--accent);color:#000;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:13px;flex-shrink:0;
  overflow:hidden;
}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-author{font-size:13px;font-weight:700}
.post-date{font-size:11px;color:var(--muted2);margin-top:2px}
.post-badge{
  margin-left:auto;font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;font-weight:700;flex-shrink:0;
}
.badge-video{background:rgba(240,194,51,.12);color:var(--accent);border:1px solid rgba(240,194,51,.3)}
.badge-text{background:rgba(181,176,166,.08);color:var(--muted2);border:1px solid var(--border)}
.badge-image{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
.badge-pinned{background:rgba(240,194,51,.15);color:var(--accent);border:1px solid rgba(240,194,51,.4);margin-left:8px}

/* POST BODY */
.post-body{padding:16px 24px 20px}
.post-title{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:10px;line-height:1.2}
.post-text{font-size:15px;color:var(--muted2);line-height:1.8}

/* VIDEO EMBED */
.video-container{
  position:relative;margin:0 24px 20px;border-radius:10px;overflow:hidden;
  background:#000;border:1px solid var(--border);
}
.video-container iframe{
  width:100%;aspect-ratio:16/9;display:block;border:none;
}
.video-placeholder{
  aspect-ratio:16/9;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;
  background:linear-gradient(135deg,#111118 0%,#19191f 100%);
  border-radius:10px;overflow:hidden;
  position:relative;cursor:pointer;
}
.vp-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,rgba(240,194,51,.08) 0%,transparent 65%);
  pointer-events:none;
}
.vp-play{
  width:72px;height:72px;border-radius:50%;
  background:rgba(240,194,51,.12);border:2px solid rgba(240,194,51,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;transition:transform .2s,background .2s;
  position:relative;z-index:1;
}
.video-placeholder:hover .vp-play{transform:scale(1.08);background:rgba(240,194,51,.2)}
.vp-label{font-size:13px;font-weight:700;color:var(--muted2);position:relative;z-index:1}
.vp-sub{font-size:11px;color:var(--muted);position:relative;z-index:1;letter-spacing:.05em}
.vp-badge{
  position:absolute;top:16px;right:16px;
  background:rgba(240,194,51,.9);color:#000;
  font-size:9px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;
  padding:4px 10px;border-radius:99px;
}

/* TAGS */
.post-tags{padding:0 24px 20px;display:flex;gap:6px;flex-wrap:wrap}
.tag{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border:1px solid var(--border);border-radius:99px;
  color:var(--muted);font-weight:500;
}

/* DIVIDER */
.feed-divider{
  text-align:center;padding:24px 0;color:var(--muted);font-size:11px;
  letter-spacing:.2em;text-transform:uppercase;
  display:flex;align-items:center;gap:16px;margin:0 0 28px;
}
.feed-divider::before,.feed-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* EMPTY / LOADING */
#feedLoading{text-align:center;padding:80px;color:var(--muted);font-size:14px}

/* HOW TO POST */
.how-to-post{
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:var(--r);padding:20px 24px;margin-bottom:28px;
  font-size:13px;color:var(--muted2);line-height:1.9;
}
.how-to-post strong{color:var(--text)}
.how-to-post code{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:1px 6px;font-size:11px;color:var(--accent);font-family:monospace;
}

/* RESPONSIVE */
@media(max-width:768px){
  nav{padding:0 20px}.nav-links{display:none}
  .page-header{padding:40px 20px 30px}
  .feed-wrap{padding:28px 20px 0}
  .video-container,.video-placeholder{margin:0 0 16px}
  .post-meta,.post-body,.post-tags{padding-left:16px;padding-right:16px}
  .video-container{margin:0 16px 16px}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><em>ZIZO</em><span class="nav-divider">·</span>Abdelaziz Askar</a>
  <ul class="nav-links">
    <li><a href="index.html">Work</a></li>
    <li><a href="clients.html">Brands</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="news.html" class="active">News</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="mailto:bananalover9119@gmail.com" class="nav-cta">Let's Talk →</a>
</nav>

<div class="page-header">
  <div class="ph-left">
    <div class="eyebrow">Live Creative Feed</div>
    <h1>The <em>Feed</em></h1>
    <p>Ideas, work-in-progress, client results, and video guides from ZIZO's creative world. Updated as things happen.</p>
  </div>
  <div class="ph-right">
    <div class="post-count" id="postCount">—</div>
    <div class="pc-label">Posts</div>
  </div>
</div>

<div class="feed-wrap">
  <div id="feedLoading">Loading feed…</div>
  <div id="feedContainer" style="display:none"></div>
</div>

<script>
const AUTHOR = { name:'Abdelaziz "ZIZO" Askar', photo:'' };

function fmtDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

function typeBadge(type){
  if(type==='video') return '<span class="post-badge badge-video">🎬 Video</span>';
  if(type==='image') return '<span class="post-badge badge-image">🖼 Image</span>';
  return '<span class="post-badge badge-text">✏️ Post</span>';
}

function videoBlock(post){
  if(post.youtube){
    return `<div class="video-container">
      <iframe src="https://www.youtube.com/embed/${post.youtube}?rel=0&modestbranding=1"
              allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
              allowfullscreen loading="lazy"></iframe>
    </div>`;
  }
  return `<div style="margin:0 24px 20px">
    <div class="video-placeholder">
      <div class="vp-glow"></div>
      <div class="vp-badge">Coming Soon</div>
      <div class="vp-play">🎬</div>
      <div class="vp-label">${post.title}</div>
      <div class="vp-sub">Video being recorded — check back soon</div>
    </div>
  </div>`;
}

function renderPost(post, idx, total){
  const isPinned = post.pinned;
  const tags = (post.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const avatar = AUTHOR.photo
    ? `<img src="${AUTHOR.photo}" alt="ZIZO" onerror="this.remove()">`
    : 'Z';

  let mediaHTML = '';
  if(post.type==='video') mediaHTML = videoBlock(post);
  else if(post.type==='image' && post.thumb) mediaHTML = `<div style="margin:0 24px 20px;border-radius:10px;overflow:hidden;border:1px solid var(--border)"><img src="${post.thumb}" alt="${post.title}" style="width:100%;display:block"></div>`;

  let divider = '';
  if(isPinned && total > 1 && idx === 0){
    divider = `<div class="feed-divider">Latest posts</div>`;
  }

  return `
    <div class="post-card${isPinned?' pinned':''}">
      <div class="post-meta">
        <div class="post-avatar">${avatar}</div>
        <div>
          <div class="post-author">${AUTHOR.name}</div>
          <div class="post-date">${fmtDate(post.date)}</div>
        </div>
        ${typeBadge(post.type)}
        ${isPinned?'<span class="post-badge badge-pinned">📌 Pinned</span>':''}
      </div>
      <div class="post-body">
        <div class="post-title">${post.title}</div>
        <p class="post-text">${post.body}</p>
      </div>
      ${mediaHTML}
      ${tags?`<div class="post-tags">${tags}</div>`:''}
    </div>
    ${divider}
  `;
}

fetch('feed.json')
  .then(r=>r.json())
  .then(posts=>{
    document.getElementById('feedLoading').style.display='none';
    document.getElementById('feedContainer').style.display='block';
    document.getElementById('postCount').textContent=posts.length;

    const pinned = posts.filter(p=>p.pinned);
    const rest = posts.filter(p=>!p.pinned);
    const ordered = [...pinned, ...rest];

    document.getElementById('feedContainer').innerHTML =
      ordered.map((p,i)=>renderPost(p,i,ordered.length)).join('');
  })
  .catch(()=>{
    document.getElementById('feedLoading').innerHTML =
      '<p style="color:var(--muted)">Could not load feed. Make sure feed.json exists.</p>';
  });
</script>
</body>
</html>
