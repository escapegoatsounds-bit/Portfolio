<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · ZIZO</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090c; --s1:#111118; --s2:#19191f; --b:#252532;
  --gold:#f0c233; --gold2:#ffe566;
  --purple:#8b5cf6;
  --text:#f3f0eb; --m:#706c64; --m2:#b5b0a6;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative}
a{color:inherit;text-decoration:none}

/* grid bg */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0;
}

/* glow */
.glow{position:fixed;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(240,194,51,.08) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;
  animation:pulse 4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}}

/* main card */
.card{
  position:relative;z-index:2;
  text-align:center;
  max-width:560px;
  padding:0 24px;
}
.err-num{
  font-size:clamp(120px,18vw,200px);font-weight:900;
  line-height:.9;letter-spacing:-8px;
  color:transparent;
  -webkit-text-stroke:2px rgba(240,194,51,.3);
  user-select:none;margin-bottom:8px;
  position:relative;
}
.err-num::after{
  content:'404';
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:inherit;font-weight:inherit;letter-spacing:inherit;
  color:var(--gold);opacity:.07;
  filter:blur(20px);
}
.eyebrow{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.headline{font-size:clamp(24px,4vw,40px);font-weight:900;letter-spacing:-1.5px;line-height:1.1;margin-bottom:16px}
.headline em{color:var(--gold);font-style:normal}
.subtext{font-size:15px;color:var(--m2);line-height:1.75;max-width:400px;margin:0 auto 40px}

/* buttons */
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:48px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;
     font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;
     border-radius:var(--r);transition:all .2s;font-family:var(--font);cursor:pointer}
.btn-primary{background:var(--gold);color:#000;border:none}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--m2);border:1px solid var(--b)}
.btn-ghost:hover{border-color:var(--m2);color:var(--text);transform:translateY(-2px)}

/* quick links */
.quick-links{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.quick-link{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--m);
            transition:color .2s;border-bottom:1px solid transparent;padding-bottom:2px}
.quick-link:hover{color:var(--gold);border-bottom-color:var(--gold)}

/* floating nav */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;
  background:rgba(5,5,6,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b);}
.nav-logo{font-size:14px;font-weight:700;color:var(--m2)}
.nav-logo em{color:var(--gold);font-style:normal;font-size:19px;font-weight:900;margin-right:2px}
.nav-back{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--m2);
          transition:color .2s}
.nav-back:hover{color:var(--gold)}
</style>
</head>
<body>

<div class="glow"></div>

<nav class="top-nav">
  <a href="index.html" class="nav-logo"><em>ZI</em><span style="color:var(--gold)">ZO</span> <span style="color:var(--m);font-weight:300;margin:0 6px">·</span> <span style="font-size:13px">Abdelaziz Askar</span></a>
  <a href="index.html" class="nav-back">← Back to Portfolio</a>
</nav>

<div class="card">
  <div class="eyebrow">Error 404</div>
  <div class="err-num">404</div>
  <h1 class="headline">This page went<br><em>off-script.</em></h1>
  <p class="subtext">
    Looks like this page doesn't exist — or it moved. Creative directors pivot fast,
    but we forgot to leave a redirect.
  </p>

  <div class="btn-row">
    <a href="index.html" class="btn btn-primary">← Back to Portfolio</a>
    <a href="contact.html" class="btn btn-ghost">Get In Touch</a>
  </div>

  <div class="quick-links">
    <a href="index.html" class="quick-link">Work</a>
    <a href="about.html" class="quick-link">About</a>
    <a href="clients.html" class="quick-link">Brands</a>
    <a href="contact.html" class="quick-link">Contact</a>
  </div>
</div>

</body>
</html>
