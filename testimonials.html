<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/photos/escapegoat-logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviews — Abdelaziz Askar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e10;--card:#16161a;--b:#2c2c33;--gold:#f0c233;--purple:#a78bfa;--text:#f4f2ed;--m2:#c2bcb2;--font:'Inter',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse at 50% -10%,#1a1530,#0e0e10 60%);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;min-height:100vh;padding:0 0 60px}
.app{max-width:440px;margin:0 auto;padding:0 14px}
.appbar{position:sticky;top:0;z-index:10;background:rgba(14,14,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);padding:16px 6px 14px;text-align:center;margin-bottom:14px}
.appbar h1{font-size:20px;font-weight:900;letter-spacing:-.4px}
.appbar h1 em{color:var(--gold);font-style:normal}
.appbar p{font-size:12px;color:var(--m2);margin-top:3px}
.appbar .cnt{display:inline-block;margin-top:8px;font-size:11px;color:var(--gold);border:1px solid var(--b);border-radius:99px;padding:4px 12px}
.t-card{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:16px;margin-bottom:12px}
.t-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.t-av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;position:relative;overflow:hidden;flex-shrink:0}
.t-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.t-name{font-size:15px;font-weight:800}
.t-role{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--purple);margin-top:2px}
.t-stars{color:var(--gold);font-size:13px;margin:2px 0 10px}
.t-quote{font-size:14px;line-height:1.65;color:var(--text)}
.t-quote b{color:var(--gold);font-weight:700}
.t-call{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;background:#0d0d0f;border:1px solid var(--b);color:var(--gold);
  border-radius:99px;padding:10px;font-size:13px;font-weight:700;text-decoration:none;transition:border-color .2s}
.t-call:hover{border-color:var(--gold)}
.home-chip{position:fixed;top:14px;left:14px;z-index:50;display:flex;align-items:center;gap:6px;background:rgba(10,10,10,.85);border:1px solid #333;color:var(--gold);border-radius:99px;padding:7px 14px;font:700 12px Inter,sans-serif;text-decoration:none;backdrop-filter:blur(10px)}
</style>
</head>
<body>
<a href="index.html" class="home-chip">⌂ Home</a>
<div class="app">
  <div class="appbar">
    <h1>Reviews <em>&amp; References</em></h1>
    <p>What clients and collaborators say about working with Abdelaziz</p>
    <span class="cnt" id="cnt">★ Trusted across Egypt · Qatar · UAE</span>
  </div>
  <div id="list"></div>
</div>
<script>
const T=[
  ['Arnaud Verchere','Group CEO · Tonic International Dubai','person-arnaud.png',5,'Working with Abdelaziz is a masterclass in <b>efficiency</b>. He didn\'t just improve our workflow — he genuinely changed how we collaborate daily. He\'s a critical thinker who doesn\'t just find flaws — he builds the solutions to fix them.'],
  ['Mohamed Shafei','Founder · Deraya Real Estate','person-shafei.png',5,'Abdelaziz clearly played a <b>pivotal role</b> in Deraya\'s history. Launching a real estate brand\'s social presence in 2015 — right as the Egyptian market was shifting heavily toward digital — was a massive undertaking.'],
  ['Amina Rashad','Vice Chairman & Founder · Glow','person-amina.png',5,'Abdelaziz brought a level of <b>creative edge</b> to Glow that we were missing, seamlessly integrating AI tools and modern video trends to keep us at the top of our customers\' feeds.'],
  ['Sherry ElKilany','Managing Partner · Nineteen84','person-sherry.png',5,'His strength has always been his creative judgment and deep sense of <b>ownership</b>. He approached our brands with the care and loyalty of someone who genuinely believed in what we were building.'],
  ['Ismail Drouby','Founder & CEO · Delight Pastries & Scoop Empire','',5,'Abdelaziz owned our entire operational and digital presence. He didn\'t just launch our social — he built our inbound and outbound call center, directed all brand photography and QA. An <b>invaluable asset</b>.'],
  ['Sherif ElSersy','Chairman · No Limits Furniture','',5,'Highly professional, reliable, and consistently delivered strong results. His understanding of social media strategy made a <b>real difference</b> to our online presence.'],
  ['Mikey MTM','Music Artist · MTM','',5,'Zizo has been an incredible partner and friend throughout our musical journey. He doesn\'t just do the work — he <b>lives the project</b> with you.'],
  ['Shehab Kassem','Chairman · DEFARM FOODS','',5,'Rare to find someone who handles the <b>entire creative spectrum</b> effortlessly. Whether it\'s art direction or full-scale social — the output is always world-class.']
];
const ini=n=>n.split(' ').slice(0,2).map(w=>w[0]).join('');
document.getElementById('list').innerHTML=T.map(t=>`
  <div class="t-card">
    <div class="t-head">
      <div class="t-av">${ini(t[0])}${t[2]?`<img src="assets/logos/${t[2]}" alt="${t[0]}" onerror="this.remove()">`:''}</div>
      <div><div class="t-name">${t[0]}</div><div class="t-role">${t[1]}</div></div>
    </div>
    <div class="t-stars">${'★'.repeat(t[3])}${'☆'.repeat(5-t[3])}</div>
    <div class="t-quote">${t[4]}</div>
    <a class="t-call" href="tel:+201099197988">📞 Reference on request</a>
  </div>`).join('');
</script>
<script src="editor.js?v=2"></script>
</body>
</html>
