html,body{margin:0;height:100%;background:#0b0714;overflow:hidden;font-family:'Courier New',monospace}
#wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
canvas{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;cursor:crosshair;touch-action:none}

<body>
<div id="wrap"><canvas id="cv" width="960" height="540"></canvas><div id="scan"></div></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=960,H=540,GY=470;                      // ground Y
const GOLD='#f0c233',PURP='#8b5cf6',PINK='#ff7ad9';
let scene='menu', score=0, level=1, bonesLeft=5, best=+(localStorage.bt_best||0);
let mode='brawl';                               // 'brawl' = Alley Brawler · 'bone' = classic Bone Toss
let bone=null, blocks=[], drag=null, fetchDog=null, msg='', msgT=0, won=false;

const skX=60;                                   // skippy idle x
const sling={x:150,y:GY-90};

function emoji(e,x,y,s,rot){ctx.save();ctx.translate(x,y);if(rot)ctx.rotate(rot);ctx.font=s+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(e,0,0);ctx.restore();}
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0);}

/* ---------- levels: stacks of crates + BRIEF targets ---------- */
function buildLevel(n){
  blocks=[]; bonesLeft=5; won=false;
  const base=700;
  const add=(x,y,t)=>blocks.push({x,y:GY-y,w:46,h:46,vx:0,vy:0,t,dead:false});
  if(n===1){ add(base,46,'crate');add(base+50,46,'crate');add(base+25,92,'brief');
             add(base+120,46,'brief'); }
  if(n===2){ add(base-40,46,'crate');add(base+10,46,'brief');add(base+60,46,'crate');
             add(base-15,92,'brief');add(base+35,92,'crate');add(base+10,138,'brief'); }
  if(n===3){ for(let i=0;i<4;i++)add(base-60+i*50,46,i%2?'brief':'crate');
             for(let i=0;i<3;i++)add(base-35+i*50,92,i%2?'crate':'brief');
             add(base+15,138,'brief');add(base-10,184,'vinyl'); }
  newBone();
}
function newBone(){ bone={x:sling.x,y:sling.y,vx:0,vy:0,rot:0,flying:false,rest:false}; }

/* ---------- input ---------- */
function evPos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
  // object-fit:contain mapping
  const sc=Math.min(r.width/W,r.height/H),ox=(r.width-W*sc)/2,oy=(r.height-H*sc)/2;
  return{x:(t.clientX-r.left-ox)/sc,y:(t.clientY-r.top-oy)/sc};}
const MBTN=[
  {t:'🥊  ALLEY BRAWLER',y:210,act:()=>{mode='brawl';score=0;scene='brawl';brawlInit(1);}},
  {t:'🦴  BONE TOSS',    y:268,act:()=>{mode='bone';score=0;level=1;scene='play';buildLevel(1);}},
  {t:'🎮  CONTROLS',     y:326,act:()=>{scene='controls';}},
  {t:'✕  EXIT',          y:384,act:()=>{try{parent.postMessage('eg-exit','*');}catch(_){}if(parent===window)history.back();}}
];
const inR=(p,x,y,w,h)=>p.x>x&&p.x<x+w&&p.y>y&&p.y<y+h;
function down(e){const p=evPos(e);
  if(scene==='menu'){
    for(const b of MBTN)if(inR(p,W/2-170,b.y,340,46)){b.act();return;}
    if(inR(p,14,H-46,160,32))scene='skills';
    return;}
  if(scene==='skills'){if(inR(p,W/2-110,H-78,220,44))scene='menu';return;}
  if(scene==='controls'){if(inR(p,W/2-110,H-70,220,44))scene='menu';return;}
  if(scene==='over'){scene='menu';score=0;level=1;return;}
  if(inR(p,W-104,10,94,32)){scene='menu';return;}            // in-game MENU button
  if(scene==='brawl'){brJump();return;}                      // tap/click = jump
  if(scene==='play'&&bone&&!bone.flying&&!fetchDog&&Math.hypot(p.x-bone.x,p.y-bone.y)<70)drag=p;}
function move(e){if(drag){drag=evPos(e);e.preventDefault();}}
function up(){
  if(drag&&bone){
    let dx=sling.x-drag.x,dy=sling.y-drag.y;
    const pow=Math.min(Math.hypot(dx,dy),140)/Math.max(Math.hypot(dx,dy),.01);
    bone.vx=dx*pow*.16; bone.vy=dy*pow*.16;
    if(Math.hypot(bone.vx,bone.vy)>2){bone.flying=true;bonesLeft--;}
    else{bone.x=sling.x;bone.y=sling.y;}
  }
  drag=null;}
cv.addEventListener('mousedown',down);cv.addEventListener('mousemove',move);addEventListener('mouseup',up);
cv.addEventListener('touchstart',down,{passive:true});cv.addEventListener('touchmove',move,{passive:false});addEventListener('touchend',up);

/* ---------- physics ---------- */
function step(){
  if(scene!=='play')return;
  if(bone&&bone.flying&&!bone.rest){
    bone.vy+=.42; bone.x+=bone.vx; bone.y+=bone.vy; bone.rot+=bone.vx*.04;
    if(bone.y>GY-12){bone.y=GY-12;bone.vy*=-.45;bone.vx*=.7;if(Math.abs(bone.vy)<1.6)bone.vy=0;}
    if(Math.abs(bone.vx)<.25&&bone.vy===0&&bone.y>=GY-13)bone.rest=true;
    if(bone.x>W+60||bone.x<-60)bone.rest=true;
    // collisions
    for(const b of blocks){if(b.dead)continue;
      if(bone.x>b.x-10&&bone.x<b.x+b.w+10&&bone.y>b.y-10&&bone.y<b.y+b.h+10){
        b.vx+=bone.vx*.55;b.vy+=bone.vy*.35-2;
        bone.vx*=.55;bone.vy*=-.3;
        hit(b);
      }}
    if(bone.rest&&!fetchDog)fetchDog={x:skX,phase:'go',hasBone:false};
  }
  for(const b of blocks){if(b.dead)continue;
    b.vy+=.42;b.x+=b.vx;b.y+=b.vy;b.vx*=.985;
    let floor=GY-b.h;
    for(const o of blocks){if(o===b||o.dead)continue;
      if(b.x+b.w>o.x+6&&b.x<o.x+o.w-6&&b.y+b.h<=o.y+12&&b.y+b.h+b.vy>=o.y-2)floor=Math.min(floor,o.y-b.h);}
    if(b.y>floor){b.y=floor;if(Math.abs(b.vy)>3.5)hit(b);b.vy=0;}
    if(b.x>W+40||b.x<-60)kill(b);
  }
  if(fetchDog){const f=fetchDog,tx=f.phase==='go'?bone.x:skX;
    f.x+=(tx-f.x)*.06+(tx>f.x?1.6:-1.6);
    if(f.phase==='go'&&Math.abs(f.x-bone.x)<18){f.phase='back';f.hasBone=true;}
    if(f.phase==='back'&&Math.abs(f.x-skX)<14){fetchDog=null;
      if(blocks.every(b=>b.dead||b.t!=='brief')){lvlClear();}
      else if(bonesLeft<=0){gameOver(false);}
      else newBone();
    }}
}
function hit(b){if(b.t==='brief'){kill(b);score+=100;flash('+100');}
  else if(b.t==='vinyl'){kill(b);score+=250;flash('+250 VINYL!');}
  else{score+=10;}}
function kill(b){if(!b.dead){b.dead=true;}}
function lvlClear(){score+=bonesLeft*50;
  if(level>=3){gameOver(true);}else{level++;flash('LEVEL '+level+'!');buildLevel(level);}}
function gameOver(w){won=w;best=Math.max(best,score);localStorage.bt_best=best;scene='over';}
function flash(t){msg=t;msgT=90;}

/* ---------- character sprites: real art, white background keyed out at load ---------- */
function loadSprite(src,opt){
  opt=opt||{};
  const sp={cv:null,ready:false,w:1,h:1};
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    const x=c.getContext('2d');x.drawImage(img,0,0);
    try{
      const id=x.getImageData(0,0,c.width,c.height),d=id.data,w=c.width,h=c.height;
      const seen=new Uint8Array(w*h),st=[];
      const isBg=i=>d[i]>222&&d[i+1]>222&&d[i+2]>222;            // near-white = background
      const push=(ax,ay)=>{if(ax<0||ay<0||ax>=w||ay>=h)return;const p=ay*w+ax;if(seen[p])return;seen[p]=1;st.push(p);};
      for(let i=0;i<w;i++){push(i,0);push(i,h-1);}
      for(let j=0;j<h;j++){push(0,j);push(w-1,j);}
      while(st.length){const p=st.pop(),i=p*4;if(!isBg(i))continue;d[i+3]=0;const ax=p%w,ay=p/w|0;push(ax+1,ay);push(ax-1,ay);push(ax,ay+1);push(ax,ay-1);}
      if(opt.cropL||opt.cropR){const _x0=(opt.cropL||0)*w,_x1=w-(opt.cropR||0)*w;
        for(let p=0;p<w*h;p++){const ax=p%w;if(ax<_x0||ax>=_x1)d[p*4+3]=0;}}
      x.putImageData(id,0,0);
      // true character bounds (ignore transparent padding) so feet/centre anchor exactly
      let mnx=w,mny=h,mxx=0,mxy=0,any=false;
      for(let p=0;p<w*h;p++){if(d[p*4+3]>10){any=true;const ax=p%w,ay=p/w|0;if(ax<mnx)mnx=ax;if(ax>mxx)mxx=ax;if(ay<mny)mny=ay;if(ay>mxy)mxy=ay;}}
      sp.bb=any?{x:mnx,y:mny,w:mxx-mnx+1,h:mxy-mny+1}:{x:0,y:0,w:c.width,h:c.height};
    }catch(_){sp.bb={x:0,y:0,w:c.width,h:c.height};}
    sp.cv=c;sp.w=c.width;sp.h=c.height;sp.ready=true;
  };
  img.src=src;
  return sp;
}

let FRAME=0;                                          // global animation tick
function goat(x,y,s,ang,face,pose){ // y=feet baseline · face:1/-1 · pose:'run'|'throw'|undefined(stand)
  const run=pose==='run', sp=(pose==='throw'?SPR.goatThrow:run?SPR.goatRun:SPR.goatStand);
  if(sp&&sp.ready&&sp.bb){
    const bb=sp.bb,h=s*2.4,w=h*bb.w/bb.h,f=(face!==undefined?face:(ang<0?-1:1)),t=FRAME;
    let bob=0,lean=0;
    if(run){ bob=-Math.abs(Math.sin(t*0.25))*s*0.10; lean=Math.sin(t*0.25)*0.06; }   // run cycle
    else { bob=Math.sin(t*0.06)*s*0.02; }                                            // idle breathing
    ctx.save();ctx.translate(x,y+s*0.5+bob);
    if(f<0)ctx.scale(-1,1);
    if(ang&&!run)ctx.rotate(ang); else if(lean)ctx.rotate(lean);
    ctx.drawImage(sp.cv,bb.x,bb.y,bb.w,bb.h,-w/2,-h,w,h);ctx.restore();return;
  }
  emoji('🐐',x,y,s,ang);px(x-s*.32,y-s*.30,s*.40,s*.10,PINK);
}

/* ════════ ALLEY BRAWLER — side-scrolling platformer ════════
   Escapegoat runs the album-art alley · Skippy tags along.
   ← → / A D move · SPACE / ↑ / W jump (double-jump = Skippy boost) · tap = jump */
let BR=null;
const KEY={};
addEventListener('keydown',e=>{
  KEY[e.code]=true;
  if(scene==='brawl'&&/^(Space|ArrowUp|KeyW)$/.test(e.code)){brJump();e.preventDefault();}
  if(scene==='brawl'&&/^(KeyF|KeyJ|KeyK)$/.test(e.code)){brAttack();e.preventDefault();}
  if(scene==='brawl'&&e.code==='KeyQ'){brSurge();e.preventDefault();}
  if(scene==='brawl'&&e.code==='KeyE'){brShoot();e.preventDefault();}
  if(scene==='brawl'&&e.code==='KeyM'){scene='menu';e.preventDefault();}
  if(scene==='brawl'&&/^(ArrowLeft|ArrowRight|KeyR)$/.test(e.code))e.preventDefault();
});
addEventListener('keyup',e=>{KEY[e.code]=false;});
function brawlInit(n){
  const LW=3300;

      views:0,surge:0,shots:[],skAtk:null,laser:0,

  if(n===1){
    P(0,GY,920,70);P(1040,GY,720,70);P(1880,GY,580,70);P(2580,GY,720,70);
    P(430,GY-95,130,16);P(710,GY-155,130,16);P(1180,GY-100,140,16);P(1520,GY-160,130,16);
    P(1960,GY-110,140,16);P(2270,GY-170,130,16);P(2680,GY-100,150,16);
    BR.ens.push({x:620,r0:540,r1:860,d:1},{x:1340,r0:1080,r1:1700,d:1},{x:2080,r0:1920,r1:2400,d:1},{x:2760,r0:2620,r1:3120,d:1});
    [470,760,1230,1570,2010,2320,2740,2960].forEach((x,i)=>BR.vin.push({x,y:i%2?GY-210:GY-140}));
  }else{
    P(0,GY,620,70);P(780,GY,520,70);P(1460,GY,460,70);P(2080,GY,400,70);P(2640,GY,660,70);
    P(340,GY-115,115,16);P(650,GY-175,115,16);P(920,GY-120,115,16);P(1260,GY-185,115,16);
    P(1580,GY-125,115,16);P(1900,GY-185,115,16);P(2200,GY-125,115,16);P(2480,GY-185,115,16);
    BR.ens.push({x:410,r0:220,r1:580,d:1},{x:920,r0:800,r1:1260,d:1},{x:1620,r0:1480,r1:1880,d:1},{x:2240,r0:2100,r1:2440,d:1},{x:2840,r0:2660,r1:3160,d:1});
    [380,690,950,1290,1610,1930,2230,2510,2840].forEach((x,i)=>BR.vin.push({x,y:i%2?GY-230:GY-155}));
  }
  BR.ens.forEach(e=>{ e.hp=2; e.hpMax=2; });           // zombie dummies take 2 hits
}
function brJump(){
  const p=BR&&BR.p; if(!p)return;
  if(p.onG){p.vy=-11.6;p.onG=false;}
  else if(!p.dj){p.vy=-10.6;p.dj=true;BR.boost=14;}          // Skippy boost
}
function brAttack(){
  const p=BR&&BR.p; if(!p||BR.atk>0||BR.skAtk)return;
  BR.atk=ATK_T;
  // find nearest live enemy in front of ZIZO
  const ens=BR.ens.filter(e=>!e.dead&&(e.x-p.x)*p.face>-30);
  if(ens.length){
    ens.sort((a,b)=>Math.abs(a.x-p.x)-Math.abs(b.x-p.x));
    const t=ens[0];
    BR.skAtk={tx:t.x,eid:BR.ens.indexOf(t),x:BR.sk.x,returning:false,done:false};
  }
}
function brSurge(){ if(BR&&BR.surge<=0){BR.surge=180;msg='POWER SURGE!';msgT=40;} }
function brShoot(){
  if(!BR)return;
  const p=BR.p;
  BR.shots.push({x:p.x+p.face*20,y:p.y-28,vx:p.face*9,t:90});
  msg='PROMOTE SHOT!';msgT=22;
}
function brHurt(fall){
  if(BR.inv>0&&!fall)return;
  BR.hearts--;BR.inv=80;msg='OUCH!';msgT=40;
  if(fall){BR.p.x=Math.max(60,BR.p.x-160);BR.p.y=GY-120;BR.p.vy=0;BR.p.dj=false;}
  if(BR.hearts<=0)gameOver(false);
}
function brawlStep(){
  const p=BR.p;
  const sp=3.6*(BR.surge>0?1.7:1);
  p.vx=((KEY.ArrowRight||KEY.KeyD)?sp:0)-((KEY.ArrowLeft||KEY.KeyA)?sp:0);
  if(p.vx)p.face=p.vx>0?1:-1;
  p.x+=p.vx; p.vy+=.55; p.y+=p.vy;
  p.onG=false;
  for(const pl of BR.plats){
    if(p.x>pl.x-14&&p.x<pl.x+pl.w+14&&p.vy>=0&&p.y>pl.y-34&&p.y-p.vy<=pl.y-29){
      p.y=pl.y-30;p.vy=0;p.onG=true;p.dj=false;
    }
  }
  p.x=Math.max(20,Math.min(BR.W-20,p.x));
  if(p.y>H+50)brHurt(true);
  if(BR.atk>0)BR.atk--;
  if(BR.surge>0)BR.surge--;

  // Skippy attack rush
  if(BR.skAtk&&!BR.skAtk.done){
    const sa=BR.skAtk;
    if(!sa.returning){
      sa.x+=(sa.tx-sa.x)*.28;
      if(Math.abs(sa.x-sa.tx)<14){
        sa.returning=true;
        const e=BR.ens[sa.eid];
        if(e&&!e.dead){e.hp--;e.hit=18;e.x+=p.face*20;
          if(e.hp<=0){e.dead=true;score+=80;msg='GOOD BOY! 🐕';msgT=32;}
          else{msg='HIT!';msgT=14;}}
      }
    } else {
      sa.x+=(BR.sk.x-sa.x)*.18;
      if(Math.abs(sa.x-BR.sk.x)<10)sa.done=true;
    }
  }
  if(BR.skAtk&&BR.skAtk.done)BR.skAtk=null;

  // Promote shots
  BR.shots=BR.shots.filter(sh=>{
    sh.x+=sh.vx; sh.t--;
    if(sh.t<=0||sh.x<0||sh.x>BR.W)return false;
    for(const e of BR.ens){if(e.dead)continue;
      if(Math.abs(sh.x-e.x)<28&&Math.abs(sh.y-(GY-26))<44){
        e.hp--;e.hit=12;if(e.hp<=0){e.dead=true;score+=70;msg='PROMOTED! 📢';msgT=28;}
        return false;}}
    return true;
  });

  // Views laser (hold R)
  BR.laser=KEY.KeyR?1:0;
  if(BR.laser){
    BR.views+=3;
    for(const e of BR.ens){if(e.dead)continue;
      if((e.x-p.x)*p.face>0&&Math.abs(e.x-p.x)<W&&Math.abs((GY-26)-p.y)<80){
        if(Math.random()<.05){e.hp--;e.hit=8;
          if(e.hp<=0){e.dead=true;score+=60;BR.views+=500;msg='VIRAL! 👁';msgT=30;}}
      }}
  }

  // Zombies — aggro toward player when close, else patrol
  for(const e of BR.ens){
    const dist=p.x-e.x;
    if(Math.abs(dist)<300){e.d=dist>0?1:-1;e.x+=e.d*1.0;}
    else{e.x+=e.d*0.9;if(e.x<e.r0||e.x>e.r1)e.d*=-1;}
    if(e.hit>0)e.hit--;
    if(!e.speakT)e.speakT=0; e.speakT=Math.max(0,e.speakT-1);
    if(Math.abs(dist)<200&&e.speakT===0&&!e.dead)e.speakT=140;
    // contact damage
    if(!e.dead&&Math.abs(p.x-e.x)<26&&Math.abs(p.y-(GY-22))<34){
      if(p.vy>2&&p.y<GY-30){e.hp--;p.vy=-8.5;e.hit=14;
        if(e.hp<=0){e.dead=true;score+=50;msg='STOMP!';msgT=26;}else{msg='HIT!';msgT=14;}}
      else if(BR.atk<=0&&!BR.skAtk)brHurt(false);
    }
  }
  BR.ens=BR.ens.filter(e=>!e.dead);
  for(const v of BR.vin)if(!v.got&&Math.abs(p.x-v.x)<28&&Math.abs(p.y-v.y)<32){v.got=true;score+=25;BR.views+=200;}
  if(BR.inv>0)BR.inv--; if(BR.boost>0)BR.boost--;
  if(!BR.skAtk)BR.sk.x+=((p.x-58*p.face)-BR.sk.x)*.085;
  if(p.x>BR.door.x&&p.onG){
    if(BR.lvl<2){score+=100;brawlInit(2);msg='LEVEL 2!';msgT=60;}
    else{score+=200;gameOver(true);}
  }
  BR.cam=Math.max(0,Math.min(BR.W-W,p.x-340));
}

    if(pl.y===GY){ // wet cobble ground
      px(sx,pl.y,pl.w,H-pl.y,'#161022');px(sx,pl.y,pl.w,4,PURP);
      for(let i=0;i<pl.w;i+=46)px(sx+i+8,pl.y+20,20,5,'rgba(255,60,80,.20)');     // neon reflection
      for(let i=0;i<pl.w;i+=46)px(sx+i,pl.y+34,18,4,'rgba(240,194,51,.18)');
    }else{ // scaffold plank
      px(sx,pl.y,pl.w,10,'#5b3a29');px(sx,pl.y,pl.w,3,'#7a4d35');
      px(sx+6,pl.y+10,5,14,'#3a2418');px(sx+pl.w-11,pl.y+10,5,14,'#3a2418');
    }
  }
  // vinyls
  for(const v of BR.vin){if(v.got)continue;const sx=v.x-c;if(sx<-30||sx>W+30)continue;
    const bob=Math.sin(Date.now()/300+v.x)*5;
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx,v.y+bob,15,0,7);ctx.fill();
    ctx.fillStyle=GOLD;ctx.beginPath();ctx.arc(sx,v.y+bob,5,0,7);ctx.fill();}
  // zombies — shambling toward player
  for(const e of BR.ens){const sx=e.x-c;if(sx<-60||sx>W+60)continue;
    const sway=Math.sin((FRAME+e.x)*0.06)*(e.hit>0?4:2), hit=(e.hit>0);
    const face=e.d>0?1:-1;
    ctx.save();ctx.translate(sx+sway,GY);
    if(hit)ctx.translate(((FRAME%2)?1:-1)*3,0);
    // legs shuffling
    const lk=Math.sin(FRAME*0.14+e.x)*6;
    px(-6,-14,7,14,hit?'#7a5c3a':'#4a3a24');px(1,-14+Math.abs(lk),7,14-Math.abs(lk),hit?'#7a5c3a':'#4a3a24');
    // torso — rotting rags
    px(-14,-52,28,38,hit?'#6b9c55':'#3d6630');
    px(-14,-52,28,5,'#2a4a20');px(-14,-32,28,4,'#2a4a20');             // rag strips
    // arms outstretched (zombie reach)
    ctx.fillStyle=hit?'#6b9c55':'#3d6630';
    ctx.save();ctx.translate(face*-14,-38);ctx.rotate(face*-0.5+Math.sin(FRAME*.08)*.15);
    px(0,-4,face>0?-26:26,8,'#3d6630');ctx.restore();
    ctx.save();ctx.translate(face*14,-38);ctx.rotate(face*0.3);
    px(0,-4,face>0?20:-20,8,'#3d6630');ctx.restore();
    // head
    ctx.fillStyle=hit?'#a0c880':'#6b9040';ctx.beginPath();ctx.arc(0,-62,14,0,7);ctx.fill();
    // glowing red eyes
    ctx.fillStyle=hit?'#ff4040':'#cc0000';
    ctx.beginPath();ctx.arc(-5,-64,3,0,7);ctx.fill();
    ctx.beginPath();ctx.arc(5,-64,3,0,7);ctx.fill();
    // decayed mouth
    ctx.fillStyle='#1a0a0a';ctx.fillRect(-7,-57,14,4);
    ctx.fillStyle='#8b0000';ctx.fillRect(-5,-57,3,3);ctx.fillRect(2,-57,3,3);
    ctx.restore();
    if(e.hpMax>1){for(let k=0;k<e.hpMax;k++)px(sx-9+k*9,GY-88,7,5,k<e.hp?PINK:'#3a2a3a');}
    // speech bubble "We want likes 👍"
    if(e.speakT>0&&e.speakT<130){
      const bw=148,bx=sx-bw/2,by=GY-98;
      ctx.fillStyle='rgba(255,255,255,.92)';ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(bx,by,bw,22,5);else ctx.rect(bx,by,bw,22);
      ctx.fill();
      ctx.fillStyle='#990000';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('We want likes 👍',sx,by+15);ctx.textAlign='left';
    }
  }
  // studio door (goal)
  {const sx=BR.door.x-c;if(sx<W+100){
    px(sx,GY-120,BR.door.w,120,'#241a38');px(sx+10,GY-110,BR.door.w-20,90,'#15101f');
    ctx.save();ctx.shadowColor=PINK;ctx.shadowBlur=18;ctx.fillStyle=PINK;ctx.font='bold 16px monospace';ctx.fillText('STUDIO',sx+8,GY-128);ctx.restore();}}
  // promote shots
  for(const sh of BR.shots){const sx=sh.x-c;if(sx<-20||sx>W+20)continue;
    ctx.save();ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.translate(sx,sh.y);if(sh.vx<0)ctx.scale(-1,1);
    ctx.fillText('📢',0,0);ctx.restore();}
  // views laser beam
  if(BR.laser){
    const pp=BR.p,ppx=pp.x-c,lx1=ppx+pp.face*22,lx2=pp.face>0?W+60:-60;
    ctx.save();ctx.strokeStyle='#00eeff';ctx.lineWidth=4+Math.sin(FRAME*.5)*2;
    ctx.shadowColor='#00eeff';ctx.shadowBlur=18;ctx.globalAlpha=.85;
    ctx.beginPath();ctx.moveTo(lx1,pp.y-30);ctx.lineTo(lx2,pp.y-30);ctx.stroke();
    ctx.globalAlpha=.3;ctx.lineWidth=14;ctx.beginPath();ctx.moveTo(lx1,pp.y-30);ctx.lineTo(lx2,pp.y-30);ctx.stroke();
    ctx.restore();
    ctx.fillStyle='#00eeff';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('👁 VIEWS LASER',ppx,pp.y-48);ctx.textAlign='left';
  }
  // surge aura
  if(BR.surge>0){
    ctx.save();ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.globalAlpha=.5+(Math.sin(FRAME*.4)*.3);
    ctx.shadowColor=GOLD;ctx.shadowBlur=20;
    ctx.beginPath();ctx.arc(BR.p.x-c,BR.p.y-30,36,0,7);ctx.stroke();
    ctx.restore();}
  // skippy — use skAtk position when rushing, else follow player
  const moving=Math.abs(BR.p.vx)>0.5||!BR.p.onG;
  const skDrawX=BR.skAtk?BR.skAtk.x-c:BR.sk.x-c;
  const skFace=BR.skAtk?BR.p.face:(BR.p.vx>0?1:BR.p.vx<0?-1:BR.p.face);
  dog(skDrawX,GY-22,46,moving||!!BR.skAtk,skFace);
  if(BR.boost>0)emoji('💨',BR.p.x-c-22*BR.p.face,BR.p.y+26,18);
  if(!(BR.inv>0&&(FRAME>>2)%2)){
    const pose=BR.atk>0?'throw':((BR.atk<=0&&moving)?'run':undefined);
    goat(BR.p.x-c,BR.p.y,56,0,BR.p.face,pose);
    drawWeapon(BR.p.x-c,BR.p.y,56,BR.p.face,BR.atk);
  }
  // HUD
  ctx.fillStyle=GOLD;ctx.font='bold 18px monospace';ctx.fillText('SCORE '+score,18,32);
  ctx.fillStyle=PINK;ctx.fillText('LVL '+BR.lvl+'/2',180,32);
  let hs='';for(let i=0;i<BR.hearts;i++)hs+='❤️';ctx.font='16px serif';ctx.fillText(hs,290,31);
  // VIEWS counter top-right
  const vStr=BR.views>=1000?(BR.views/1000).toFixed(1)+'K':String(BR.views);
  ctx.fillStyle='#00eeff';ctx.font='bold 14px monospace';ctx.textAlign='right';
  ctx.fillText('👁 '+vStr+' VIEWS',W-118,32);ctx.textAlign='left';
  px(W-104,10,94,32,'rgba(139,92,246,.25)');ctx.strokeStyle=PURP;ctx.strokeRect(W-104,10,94,32);
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.fillText('MENU',W-86,31);
  // special move hints
  const hints=BR.surge>0?'⚡ SURGE '+(BR.surge/60|0)+'s':'Q=Surge  E=Shot  R=Laser  F=Skippy';
  ctx.fillStyle=BR.surge>0?GOLD:'rgba(255,255,255,.35)';ctx.font='11px monospace';
  ctx.fillText(hints,18,H-14);
  if(msgT>0){msgT--;ctx.fillStyle=PINK;ctx.font='bold '+(26+msgT/6)+'px monospace';ctx.textAlign='center';ctx.fillText(msg,W/2,150);ctx.textAlign='left';}
}
function draw(){
  if(scene==='menu'){menu();return;}
  if(scene==='controls'){controls();return;}
  if(scene==='skills'){skills();return;}
  if(scene==='over'){over();return;}
  if(scene==='brawl'){brawlDraw();return;}
  bg();
  for(const b of blocks)blockDraw(b);
  drawSling();
  goat(sling.x-58,GY-40,64);                                  // escapegoat by the sling
  if(bone&&bone.flying&&!(fetchDog&&fetchDog.hasBone))boneDraw(bone.x,bone.y,bone.rot);
  if(fetchDog){dog(fetchDog.x,GY-24,40);if(fetchDog.hasBone)boneDraw(fetchDog.x+16,GY-34,0,22);
    ctx.fillStyle=PINK;ctx.font='bold 12px monospace';ctx.fillText('FETCH!',fetchDog.x-18,GY-56);}
  else dog(skX,GY-24,40);
  hud();
}
(function loop(){FRAME++;step();if(scene==='brawl')brawlStep();draw();requestAnimationFrame(loop);})();
function applyGameHash(){
  if(location.hash.includes('bonetoss')){mode='bone';score=0;level=1;scene='play';buildLevel(1);}
  else if(location.hash.includes('play')){mode='brawl';score=0;scene='brawl';brawlInit(1);}
  else if(location.hash.includes('skills')){scene='skills';}
  else if(location.hash.includes('menu')){scene='menu';}
}
applyGameHash();
window.addEventListener('hashchange',applyGameHash);
</script>

  document.body.appendChild(chip);
}
